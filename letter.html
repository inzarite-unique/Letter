<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配属1周年の感謝を込めて</title>
    <style>
        :root {
            --bg-color: #fff0f5;
            --pink-primary: #ff69b4;
            --pink-dark: #ff1493;
            --violet-primary: #8a2be2;
            --violet-dark: #4b0082;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color), #e6e6fa);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
        }

        /* Envelope Container */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: var(--pink-primary);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-5px);
        }

        /* Envelope Flap (Top) */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid var(--violet-primary);
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.2s;
        }

        /* Open state for flap */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* Envelope Front Pocket Body */
        .envelope-wrapper::after {
            content: "";
            position: absolute;
            z-index: 3;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-bottom: 110px solid var(--pink-dark);
            bottom: 0;
        }

        /* Purple side folds to make it look realistic */
        .sides {
            position: absolute;
            z-index: 3;
            width: 0;
            height: 0;
            border-top: 110px solid transparent;
            border-bottom: 110px solid transparent;
            border-left: 160px solid var(--violet-dark);
            opacity: 0.2;
        }

        /* The Heart Seal */
        .heart {
            position: absolute;
            top: 42%;
            left: 45%;
            width: 32px;
            height: 32px;
            background-color: #ff007f;
            z-index: 4;
            transform: rotate(-45deg);
            transition: transform 0.4s ease, opacity 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .heart::before, .heart::after {
            content: "";
            background-color: #ff007f;
            border-radius: 50%;
            position: absolute;
            width: 32px;
            height: 32px;
        }
        .heart::before { top: -16px; left: 0; }
        .heart::after { left: 16px; top: 0; }

        .envelope-wrapper.open .heart {
            transform: scale(0) rotate(-45deg);
            opacity: 0;
        }

        /* The Actual Letter */
        .letter {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 290px;
            height: 200px;
            background: white;
            z-index: 1;
            border-radius: 8px;
            padding: 25px 20px;
            box-sizing: border-box;
            transition: transform 0.4s ease 0.4s, z-index 0s linear 0.4s;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-160px) scale(1.15);
            z-index: 5;
            height: auto;
            min-height: 320px;
            border: 2px solid var(--violet-primary);
        }

        .letter h1 {
            font-size: 1.25rem;
            margin: 0 0 15px 0;
            color: var(--pink-dark);
            text-align: center;
        }

        .letter p {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #333333;
            margin: 0;
            font-weight: 500;
            text-align: left;
        }

        .letter .highlight {
            color: var(--pink-dark);
            font-weight: bold;
            display: block;
            margin-top: 12px;
            border-top: 1px dashed #e6e6fa;
            padding-top: 12px;
        }

        /* Hint Text */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: var(--violet-dark);
            font-weight: bold;
            letter-spacing: 1px;
            animation: bounce 1.5s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" id="envelope">
        <div class="sides"></div>
        <div class="heart"></div>
        <div class="letter">
            <h1>🎉 配属1周年の感謝を込めて 🎉</h1>
            <p>
                5月28日をもちまして、営業システム課に配属されてから1年が経ちました。<br><br>
                これまで温かくご指導いただき、心より感謝申し上げます。まだまだ未熟な私ですが、一歩ずつ成長できるよう、今後ともよろしくお願いいたします。<br>
                <span class="highlight">最後に……！皆様の中には、私にとって「アイドルのような憧れの存在」である、大好きな先輩がいます。いつも本当にありがとうございます！✨</span>
            </p>
        </div>
        <div class="hint" id="hint-text">クリックして開く 💖</div>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const hint = document.getElementById('hint-text');

        // Optional: List of passwords you can give to allowed people
        const allowedPasswords = ["secret123", "arigato", "senpai"]; 

        envelope.addEventListener('click', () => {
            if (!envelope.classList.contains('open')) {
                // If you want password protection, uncomment the 4 lines below:
                // let password = prompt("パスワードを入力してください / Enter password:");
                // if (!allowedPasswords.includes(password?.toLowerCase().trim())) {
                //     alert("アクセス権がありません ❌"); return;
                // }
                
                envelope.classList.add('open');
                hint.style.display = 'none';
            } else {
                envelope.classList.remove('open');
                setTimeout(() => { hint.style.display = 'block'; }, 600);
            }
        });
    </script>
</body>
</html>
